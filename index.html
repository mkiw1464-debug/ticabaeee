<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Queen Nur Batrisha</title>
    <!-- Guna font Montserrat Bold untuk efek neon -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --maroon: #800000;
            --neon-pink: #ff00ff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: 'Poppins', sans-serif;
            color: white;
            user-select: none; /* Takleh highlight text */
        }

        /* Matrix Background (Tetap) */
        canvas {
            position: fixed; top: 0; left: 0; z-index: 1;
        }

        /* Base class untuk overlay */
        .overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10; display: flex;
            justify-content: center; align-items: center;
            flex-direction: column; text-align: center;
        }

        /* Neon Pink Text (Bold & Glowing) */
        .neon-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--neon-pink), 0 0 30px var(--neon-pink);
            line-height: 1.8;
            padding: 0 40px; /* Jauhkan sikit dari tepi */
        }

        /* UI Pop-up Ready */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px 30px;
            width: 80%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        button {
            padding: 15px 40px;
            margin-top: 20px;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        #yes-btn {
            background: linear-gradient(45deg, var(--neon-pink), #b03030);
            color: white;
            box-shadow: 0 0 15px var(--neon-pink);
        }

        #yes-btn:hover {
            transform: scale(1.05);
        }

        /* Floating Items (Loop) */
        #floating-container {
            display: none; /* Hide until yes clicked */
        }

        .flying-item {
            position: absolute;
            z-index: 5;
            pointer-events: none; /* Clean: takleh interact */
            animation: flyUp linear forwards;
        }

        /* Gambar Batrisha dlm bentuk love */
        .batrisha-love {
            width: 70px;
            height: 70px;
            object-fit: cover;
            clip-path: polygon(50% 15%, 85% 0%, 100% 30%, 50% 100%, 0% 30%, 15% 0%);
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 10px var(--neon-pink);
        }

        @keyframes flyUp {
            0% { transform: translateY(0) rotate(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        /* Scroll Text (Automatic) */
        #final-text-section {
            display: none;
            justify-content: center;
            align-items: center;
        }

        .scrolling-wrapper {
            position: absolute;
            top: 100%;
            width: 100%;
            text-align: center;
            animation: scrollTextUp 18s linear forwards; /* Jalan sendiri */
            padding: 0 30px;
            box-sizing: border-box;
        }

        @keyframes scrollTextUp {
            0% { top: 100%; }
            100% { top: -20%; } /* Berhenti kat tengah */
        }

        /* By Akmall Footer */
        .footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
            z-index: 100;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <!-- Stage 1: Are You Ready -->
    <div id="stage-ready" class="overlay">
        <div class="glass-card">
            <h2 class="neon-text">ARE YOU READY?</h2>
            <button id="yes-btn" onclick="startSequence()">YES</button>
        </div>
    </div>

    <!-- Stage 2: Countdown -->
    <div id="stage-countdown" class="overlay" style="display:none; background: rgba(0,0,0,0.5);">
        <h1 id="cd-txt" class="neon-text" style="font-size: 5rem;"></h1>
    </div>

    <!-- Stage 3: The Show (Floating Images, Emojis, Auto Scroll Text) -->
    <div id="final-show-section" class="overlay" style="display:none; background: transparent;">
        <!-- Container untuk floating things (Loop) -->
        <div id="floating-container"></div>
        
        <!-- Text Scroll Sendiri -->
        <div class="scrolling-wrapper">
            <p class="neon-text">
                SAYA SAYANGG AWAK SANGAT SANGATTT TAUUU HURMM SAYA MINTA MAAFF KALAU SAYA ADA BUAT SALAH DENGAN AWAKKK SAYA MINTA MAAFFF TAUUU SAYANGGGGG SAYA SAYANGGGG AWAKKK SANGATTT SANGATTT SAYA SENTIASAA RINDUU AWAKKKK HEHEHHEHE LOPYYUUU CAYANGGGG MUAHHHHH
            </p>
        </div>
    </div>

    <!-- By Akmall -->
    <div class="footer">
        by akmall
    </div>

    <script>
        // Matrix Setup
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const nameChars = "NURBATRISHA";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#800000';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = nameChars.charAt(Math.floor(Math.random() * nameChars.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // Data Gambar (Dari image_0.png) & Emoji
        const imgUrls = [
            'https://i.ibb.co/mCs6T5cR/IMG-5514.jpg',
            'https://i.ibb.co/99PQ8Q52/IMG-5306.jpg',
            'https://i.ibb.co/CpktD9pm/0e89767b-8c56-49e0-a95d-a00625f03bd8.jpg',
            'https://i.ibb.co/67VW0tyG/bc481f2e-352e-447d-89ec-9f0d40141afd.jpg',
            'https://i.ibb.co/KpxgXbBP/e5e4a40f-562f-4b64-88fd-209675fc6711.jpg'
        ];
        const loves = ['💘','💓','💕','💞','💝','💖','💗','💘','💓','💕','💞','💝','💖','💗'];

        // Function untuk buat barang terbang (Loop)
        function spawnFloatingItem() {
            const container = document.getElementById('floating-container');
            if (container.style.display === 'none') return; // Jangan spawn kalau tak tunjuk

            const div = document.createElement('div');
            div.className = 'flying-item';
            
            // Randomly choose image or love icon (60% emoji, 40% image)
            if (Math.random() > 0.4) {
                div.innerText = loves[Math.floor(Math.random() * loves.length)];
                div.style.fontSize = Math.random() * 40 + 20 + 'px'; // Rawak saiz
            } else {
                const img = document.createElement('img');
                img.src = imgUrls[Math.floor(Math.random() * imgUrls.length)];
                img.className = 'batrisha-love';
                div.appendChild(img);
            }

            // Rawak posisi mendatar (x)
            div.style.left = Math.random() * 100 + 'vw';
            // Start dari bawah
            div.style.top = '110vh';
            // Rawak durasi terbang (untuk kelajuan berbeza)
            const duration = Math.random() * 4 + 5; // Antara 5-9 saat
            div.style.animationDuration = duration + 's';

            container.appendChild(div);
            // Delete div lepas animasi tamat
            setTimeout(() => div.remove(), duration * 1000);
        }

        function startSequence() {
            document.getElementById('stage-ready').style.display = 'none';
            const s2 = document.getElementById('stage-countdown');
            const txt = document.getElementById('cd-txt');
            s2.style.display = 'flex';

            const countdownSequence = ['3', '2', '1', 'SAYA', 'SAYANG', 'AWAK'];
            let i = 0;
            const timer = setInterval(() => {
                if(i < countdownSequence.length) {
                    txt.innerText = countdownSequence[i];
                    i++;
                } else {
                    clearInterval(timer);
                    s2.style.display = 'none';
                    startFinalShow();
                }
            }, 850);
        }

        function startFinalShow() {
            document.getElementById('final-show-section').style.display = 'flex';
            document.getElementById('floating-container').style.display = 'block';
            
            // Start looping floating items
            setInterval(spawnFloatingItem, 350); // Setiap 0.35 saat satu item
        }

        // Clean: Disable right click & Drag
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('dragstart', event => event.preventDefault());

    </script>
</body>
</html>
