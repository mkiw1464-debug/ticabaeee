<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Girl</title>
    <style>
        :root {
            --maroon: #800000;
            --pink: #ff69b4;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Matrix Background */
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Overlay Layers */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.85);
            transition: opacity 0.5s ease;
        }

        #main-content {
            display: none;
            z-index: 5;
            text-align: center;
            color: white;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* UI Elements */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 80%;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: var(--maroon);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s ease;
            box-shadow: 0 0 15px var(--maroon);
        }

        button:hover {
            transform: scale(1.1);
        }

        #countdown-text {
            font-size: 5rem;
            font-weight: bold;
            color: var(--pink);
            text-shadow: 0 0 20px var(--pink);
        }

        /* Image Security */
        .photo-container {
            position: relative;
            margin-bottom: 20px;
            user-select: none;
            -webkit-user-drag: none;
        }

        .photo-container img {
            max-width: 300px;
            border-radius: 15px;
            pointer-events: none; /* Block right click/drag */
            border: 3px solid var(--maroon);
        }

        .love-icons {
            font-size: 1.5rem;
            margin-top: 15px;
        }

        .sweet-text {
            font-style: italic;
            line-height: 1.6;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <!-- Initial Pop-up -->
    <div id="popup-ready" class="overlay">
        <div class="glass-card">
            <h1 style="color: white;">Are you ready?</h1>
            <button onclick="startSequence()">YES</button>
        </div>
    </div>

    <!-- Countdown Layer -->
    <div id="countdown-layer" class="overlay" style="display: none;">
        <div id="countdown-text"></div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="overlay" style="background: transparent;">
        <div class="glass-card">
            <div class="photo-container">
                <!-- LETAK URL GAMBAR KAU KAT SINI -->
                <img src="https://i.ibb.co/mCs6T5cR/IMG-5514.jpg" alt="Nur Batrisha">
            </div>
            <h2 style="color: var(--pink);">Nur Batrisha</h2>
            <div class="love-icons">💞💕💓💗💓💝💘💖</div>
            <p class="sweet-text">
                "Setiap detik yang berlalu, <br>
                hanya nama awak yang mekar di hati. <br>
                Terima kasih sebab sentiasa ada untuk saya."
            </p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Custom Matrix Characters
        const name = "NURBATRISHA";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#800000'; // Maroon
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = name.charAt(Math.floor(Math.random() * name.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 50);

        function startSequence() {
            document.getElementById('popup-ready').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('popup-ready').style.display = 'none';
                runCountdown();
            }, 500);
        }

        function runCountdown() {
            const countdownLayer = document.getElementById('countdown-layer');
            const countdownText = document.getElementById('countdown-text');
            countdownLayer.style.display = 'flex';

            const sequence = ['3', '2', '1', 'SAYA', 'SAYANG', 'AWAK'];
            let index = 0;

            const interval = setInterval(() => {
                if (index < sequence.length) {
                    countdownText.innerText = sequence[index];
                    index++;
                } else {
                    clearInterval(interval);
                    showFinalContent();
                }
            }, 1000);
        }

        function showFinalContent() {
            document.getElementById('countdown-layer').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
        }

        // Disable Right Click
        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</body>
</html>
